<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <secttion class="all-header-section">

            <div class="logo-side-container">
                <div class="logo-box">
                    <svg class="logo" height="20" viewBox="0 0 36.289 20.768" alt="Logo" class="_8113da19">
                        <path
                            d="M18.9 20.77V0h4.93v20.77zM0 10.39a8.56 8.56 0 1 1 8.56 8.56A8.56 8.56 0 0 1 0 10.4zm5.97-.01a2.6 2.6 0 1 0 2.6-2.6 2.6 2.6 0 0 0-2.6 2.6zm27 5.2l-1.88-1.87-1.87 1.88H25.9V12.3l1.9-1.9-1.9-1.89V5.18h3.27l1.92 1.92 1.93-1.92h3.27v3.33l-1.9 1.9 1.9 1.9v3.27z">
                        </path>
                    </svg>
                </div>

                <div class="header-sections-container">
                    <section class="motors-section">
                        <img src="images/Motors.png" alt="Motors">
                        <h5>Motors</h5>
                    </section>

                    <section class="property-section">
                        <img src="images/Properties.png" alt="Properties">
                        <h5>Property</h5>
                    </section>
                </div>
            </div>

            <div class="login-side-container">
                <h5><a href="#" onclick="openPopup()">Login</a></h5>

                <div class="sell-border-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="104" height="48" viewBox="0 0 1603 768"
                        class="_3V9PS">

                    </svg>

                    <img src="images/Plus-icon.svg" alt="Sell">
                    <h5>SELL</h5>
                </div>
            </div>

        </secttion>
    </header>

    <div id="popup" class="popup">
        <div class="box">

            <span class="close" onclick="closePopup()">×</span>

            <!-- Login -->
            <div id="login">
                <h2>Welcome Back</h2>
                <input type="text" placeholder="Email">
                <input type="password" placeholder="Password">
                <button class="main-btn">Login</button>

                <p>Don't have account?
                    <span class="btn-1" onclick="showSignup()">Signup</span>
                </p>
            </div>

            <!-- Signup -->
            <div id="signup" style="display:none;">
                <h2>Create Account</h2>
                <input type="text" placeholder="Name">
                <input type="text" placeholder="Email">
                <input type="password" placeholder="Password">
                <button class="main-btn">Signup</button>

                <p>Already have account?
                    <span class="btn-2" onclick="showLogin()">Login</span>
                </p>
            </div>

        </div>
    </div>

    <section class="all-body-section">

        <div class="sort-btns-container">
            <h3>Our Products</h3>
            <div class="sort-btns-box">
                <button class="high-btn" onclick="lowToHigh()">Low To High</button>
                <button class="low-btn" onclick="highToLow()">High To Low</button> 
            </div>
        </div>

        <div id="products-container"></div>

    </section>

    <script src="js/app.js"></script>
</body>

</html>
